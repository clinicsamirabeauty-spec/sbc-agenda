<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SBC Admin — Assinaturas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0F0A06;--card:#1A120B;--card2:#231810;
  --gold:#C4956A;--gold2:#DEB887;--green:#4A9A5A;--red:#C44040;--blue:#5A8ABE;
  --text:#F0E6D8;--t2:#A8896A;--t3:#6A5040;
  --bd:#2A1F15;--r:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* LOGIN */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
.login-box{background:var(--card);border:1px solid var(--bd);border-radius:24px;padding:40px;width:100%;max-width:360px;text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:28px;font-style:italic;color:var(--gold);margin-bottom:6px}
.login-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:32px}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);color:#1A120B;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;letter-spacing:.5px;margin-top:4px;transition:.2s}
.login-btn:hover{background:var(--gold2)}
.login-err{font-size:11px;color:var(--red);margin-top:10px;min-height:16px}

/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--gold)}
.topbar-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);background:var(--bg);padding:3px 8px;border-radius:6px;border:1px solid var(--bd)}
.logout-btn{background:none;border:1px solid var(--bd);color:var(--t2);padding:6px 12px;border-radius:8px;font-size:11px;transition:.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.content{max-width:1000px;margin:0 auto;padding:28px 20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px}
.stat-val{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:4px}
.stat-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.action-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
.action-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:14px}
.action-card input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;margin-bottom:8px;outline:none;transition:.2s}
.action-card input:focus{border-color:var(--gold)}
.action-card select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;margin-bottom:8px;outline:none}
.btn-green{background:var(--green);color:white;border:none;border-radius:8px;padding:10px 18px;font-size:12px;width:100%;transition:.2s;margin-bottom:6px}
.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:white;border:none;border-radius:8px;padding:10px 18px;font-size:12px;width:100%;transition:.2s}
.btn-red:hover{opacity:.85}
.btn-gold{background:var(--gold);color:#1A120B;border:none;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:500;width:100%;transition:.2s}
.btn-gold:hover{background:var(--gold2)}
.action-result{margin-top:8px;font-size:11px;min-height:18px;text-align:center}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.table-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.table-actions{display:flex;gap:8px}
.search-inp{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;outline:none;width:200px;transition:.2s}
.search-inp:focus{border-color:var(--gold)}
.filter-sel{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;outline:none}
.refresh-btn{background:var(--card2);border:1px solid var(--bd);color:var(--t2);padding:7px 14px;border-radius:8px;font-size:12px;transition:.2s}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:10px 16px;text-align:left;border-bottom:1px solid var(--bd);font-weight:400}
td{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--t2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card2)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.badge-green{background:#4A9A5A22;color:#4A9A5A}
.badge-blue{background:#5A8ABE22;color:#5A8ABE}
.badge-red{background:#C4404022;color:#C44040}
.badge-gray{background:#6A504022;color:#6A5040}
.act-btn{background:none;border:1px solid var(--bd);color:var(--t2);padding:4px 10px;border-radius:6px;font-size:10px;transition:.2s;margin-right:4px}
.act-btn:hover{border-color:var(--gold);color:var(--gold)}
.act-btn-red{background:none;border:1px solid var(--bd);color:var(--t3);padding:4px 10px;border-radius:6px;font-size:10px;transition:.2s}
.act-btn-red:hover{border-color:var(--red);color:var(--red)}
.empty-row{text-align:center;padding:40px;color:var(--t3)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 20px;font-size:12px;color:var(--text);z-index:999;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .actions{grid-template-columns:1fr}
  .table-actions{flex-wrap:wrap}
  .search-inp{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SBC Admin</div>
    <div class="login-sub">Painel de Assinaturas</div>
    <input type="password" id="login-pass" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="login-btn" onclick="doAdminLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">SBC Admin</div>
      <div class="topbar-badge">Assinaturas</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats" id="stats">
      <div class="stat"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--green)" id="st-ativas">—</div><div class="stat-lbl">Ativas</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--blue)" id="st-trial">—</div><div class="stat-lbl">Trial</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)" id="st-pend">—</div><div class="stat-lbl">Pendentes</div></div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <!-- LIBERAR -->
      <div class="action-card">
        <div class="action-title">✓ Liberar Acesso</div>
        <input type="email" id="lib-email" placeholder="email@exemplo.com">
        <select id="lib-plano">
          <option value="mensal">Mensal — R$27,90/mês</option>
          <option value="anual">Anual — R$297,00/ano</option>
        </select>
        <input type="date" id="lib-fim" title="Validade">
        <button class="btn-green" onclick="liberarAcesso()">✓ Liberar Acesso</button>
        <div class="action-result" id="lib-result"></div>
      </div>

      <!-- BLOQUEAR -->
      <div class="action-card">
        <div class="action-title">✗ Bloquear Acesso</div>
        <input type="email" id="blk-email" placeholder="email@exemplo.com">
        <button class="btn-red" onclick="bloquearAcesso()" style="margin-top:8px">✗ Bloquear Acesso</button>
        <div style="height:12px"></div>
        <div class="action-title" style="margin-top:8px">+ Adicionar Nova Cliente</div>
        <input type="email" id="add-email" placeholder="email@exemplo.com">
        <button class="btn-gold" onclick="adicionarCliente()">+ Adicionar em Trial</button>
        <div class="action-result" id="add-result"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-head">
        <div class="table-title">Todas as Clientes</div>
        <div class="table-actions">
          <input type="text" class="search-inp" id="srch" placeholder="Buscar email..." oninput="filterTable()">
          <select class="filter-sel" id="filter-st" onchange="filterTable()">
            <option value="">Todos</option>
            <option value="ativa">Ativas</option>
            <option value="trial">Trial</option>
            <option value="trial_expirado">Trial Expirado</option>
            <option value="inadimplente">Inadimplente</option>
            <option value="cancelada">Cancelada</option>
          </select>
          <button class="refresh-btn" onclick="loadClientes()">↻ Atualizar</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Email</th>
          <th>Status</th>
          <th>Plano</th>
          <th>Validade</th>
          <th>Cadastro</th>
          <th>Ações</th>
        </tr></thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="empty-row">Clique em Atualizar para carregar</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://mcbzugxmibffzjsdniiu.supabase.co';
const SB_KEY = 'sb_secret_lU-rwa1CU8tqLwIq5PMNLQ_6rgdeHAM';
const ADMIN_PASS = 'samira@admin2024';

let allClientes = [];

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doAdminLogin() {
  const pass = document.getElementById('login-pass').value;
  if (pass === ADMIN_PASS) {
    sessionStorage.setItem('adm', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadClientes();
    // Set default date (30 days from now)
    const d = new Date(); d.setDate(d.getDate()+30);
    document.getElementById('lib-fim').value = d.toISOString().split('T')[0];
  } else {
    document.getElementById('login-err').textContent = 'Senha incorreta.';
  }
}

function doLogout() {
  sessionStorage.removeItem('adm');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-pass').value = '';
}

// Check if already logged in
if (sessionStorage.getItem('adm') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setTimeout(loadClientes, 100);
  const d = new Date(); d.setDate(d.getDate()+30);
  setTimeout(()=>{ document.getElementById('lib-fim').value = d.toISOString().split('T')[0]; }, 100);
}

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
const sbHeaders = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

async function sbGet(query) {
  const r = await fetch(`${SB_URL}/rest/v1/${query}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  return r.json();
}

async function sbPatch(table, filter, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH', headers: sbHeaders, body: JSON.stringify(data)
  });
  return r.ok;
}

async function sbPost(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST', headers: sbHeaders, body: JSON.stringify(data)
  });
  return r.ok;
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadClientes() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty-row">Carregando...</td></tr>';
  try {
    allClientes = await sbGet('clinicas?select=owner_email,assinatura_status,plano,assinatura_fim,trial_fim,bloqueado,criado_em&order=criado_em.desc');
    updateStats();
    renderTable(allClientes);
    tk('✓ Dados atualizados');
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty-row" style="color:var(--red)">Erro ao carregar. Verifique a conexão.</td></tr>';
  }
}

function updateStats() {
  document.getElementById('st-total').textContent = allClientes.length;
  document.getElementById('st-ativas').textContent = allClientes.filter(c=>c.assinatura_status==='ativa').length;
  document.getElementById('st-trial').textContent = allClientes.filter(c=>c.assinatura_status==='trial').length;
  document.getElementById('st-pend').textContent = allClientes.filter(c=>['inadimplente','trial_expirado','cancelada'].includes(c.assinatura_status)).length;
}

function filterTable() {
  const q = document.getElementById('srch').value.toLowerCase();
  const sf = document.getElementById('filter-st').value;
  renderTable(allClientes.filter(c=>
    (!q || (c.owner_email||'').toLowerCase().includes(q)) &&
    (!sf || c.assinatura_status===sf)
  ));
}

function renderTable(list) {
  const stBadge = {
    ativa: '<span class="badge badge-green">Ativa</span>',
    trial: '<span class="badge badge-blue">Trial</span>',
    trial_expirado: '<span class="badge badge-red">Trial Expirado</span>',
    inadimplente: '<span class="badge badge-red">Inadimplente</span>',
    cancelada: '<span class="badge badge-gray">Cancelada</span>',
  };

  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-row">Nenhum resultado</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(c => {
    const st = c.assinatura_status || 'trial';
    const fim = c.assinatura_fim ? fmtDate(c.assinatura_fim) : c.trial_fim ? fmtDate(c.trial_fim) : '—';
    const cad = c.criado_em ? fmtDate(c.criado_em) : '—';
    const bloq = c.bloqueado ? ' 🔒' : '';
    return `<tr>
      <td style="color:var(--text);font-weight:500">${c.owner_email||'—'}${bloq}</td>
      <td>${stBadge[st]||`<span class="badge badge-gray">${st}</span>`}</td>
      <td style="text-transform:capitalize">${c.plano||'—'}</td>
      <td>${fim}</td>
      <td>${cad}</td>
      <td>
        ${st!=='ativa'?`<button class="act-btn" onclick="quickLiberar('${c.owner_email}')">✓ Liberar</button>`:''}
        ${st==='ativa'&&!c.bloqueado?`<button class="act-btn-red" onclick="quickBloquear('${c.owner_email}')">✗ Bloquear</button>`:''}
        ${c.bloqueado?`<button class="act-btn" onclick="quickDesbloquear('${c.owner_email}')">🔓 Desbloquear</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function liberarAcesso() {
  const email = document.getElementById('lib-email').value.trim().toLowerCase();
  const plano = document.getElementById('lib-plano').value;
  const fim = document.getElementById('lib-fim').value;
  if (!email) { setResult('lib-result', '⚠ Informe o email', 'var(--red)'); return; }

  const ok = await sbPatch('clinicas', `owner_email=eq.${encodeURIComponent(email)}`, {
    assinatura_status: 'ativa',
    plano,
    assinatura_fim: fim ? fim+'T23:59:59Z' : null,
    bloqueado: false
  });

  if (ok) {
    setResult('lib-result', '✓ Acesso liberado!', 'var(--green)');
    document.getElementById('lib-email').value = '';
    tk(`✓ ${email} — acesso liberado`);
    loadClientes();
  } else {
    setResult('lib-result', '✗ Erro. Verifique o email.', 'var(--red)');
  }
}

async function bloquearAcesso() {
  const email = document.getElementById('blk-email').value.trim().toLowerCase();
  if (!email) { tk('⚠ Informe o email'); return; }
  if (!confirm(`Bloquear ${email}?`)) return;

  const ok = await sbPatch('clinicas', `owner_email=eq.${encodeURIComponent(email)}`, {
    bloqueado: true,
    assinatura_status: 'cancelada'
  });

  if (ok) {
    document.getElementById('blk-email').value = '';
    tk(`🔒 ${email} — bloqueada`);
    loadClientes();
  } else {
    tk('✗ Erro. Verifique o email.');
  }
}

async function adicionarCliente() {
  const email = document.getElementById('add-email').value.trim().toLowerCase();
  if (!email) { setResult('add-result', '⚠ Informe o email', 'var(--red)'); return; }

  const trialFim = new Date(); trialFim.setDate(trialFim.getDate()+30);
  const ok = await sbPost('clinicas', {
    owner_email: email,
    nome: email.split('@')[0],
    tipo: 'clinica',
    plano: 'trial',
    assinatura_status: 'trial',
    trial_fim: trialFim.toISOString(),
    criado_em: new Date().toISOString()
  });

  if (ok) {
    setResult('add-result', '✓ Cliente adicionada em trial!', 'var(--green)');
    document.getElementById('add-email').value = '';
    tk(`✓ ${email} — adicionada`);
    loadClientes();
  } else {
    setResult('add-result', '✗ Erro. Email já existe?', 'var(--red)');
  }
}

async function quickLiberar(email) {
  const fim = new Date(); fim.setMonth(fim.getMonth()+1);
  await sbPatch('clinicas', `owner_email=eq.${encodeURIComponent(email)}`, {
    assinatura_status: 'ativa', plano: 'mensal', bloqueado: false,
    assinatura_fim: fim.toISOString()
  });
  tk(`✓ ${email} liberada`);
  loadClientes();
}

async function quickBloquear(email) {
  if (!confirm(`Bloquear ${email}?`)) return;
  await sbPatch('clinicas', `owner_email=eq.${encodeURIComponent(email)}`, {
    bloqueado: true, assinatura_status: 'cancelada'
  });
  tk(`🔒 ${email} bloqueada`);
  loadClientes();
}

async function quickDesbloquear(email) {
  await sbPatch('clinicas', `owner_email=eq.${encodeURIComponent(email)}`, {
    bloqueado: false, assinatura_status: 'ativa'
  });
  tk(`🔓 ${email} desbloqueada`);
  loadClientes();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('pt-BR');
}

function setResult(id, msg, color) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.color = color; }
}

let toastTimer;
function tk(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
